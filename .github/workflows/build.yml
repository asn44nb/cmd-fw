          write("README.md", """\
# CustomCMD Framework

> **Pack format 57 — Minecraft 1.21.2 / 1.21.3**
> Framework only. Does not work standalone.

Advanced command-registration system for Minecraft datapacks.
Integrator packs register their commands at load-time; the framework handles
dispatch, permission checking, audit logging, and player-facing output.

---

## Scoreboards

| Objective | Type | Purpose |
|---|---|---|
| `ccmd.perm` | dummy | Player permission level (0–4) |
| `ccmd.calls` | dummy | Lifetime call count per player |
| `ccmd.errcode` | dummy | Last error code (0 ok · 1 unknown · 2 denied · 3 disabled) |
| `ccmd.trigger` | trigger | `/trigger ccmd.trigger set <id>` — player input |
| `ccmd.id` | dummy | Internal ID counter (fake players only) |
| `ccmd.state` | dummy | Internal scratchpad (fake players only) |

## Storage namespaces

| Storage | Description |
|---|---|
| `customcmd:registry` | `commands[]` array + `count` |
| `customcmd:config` | `version`, `debug`, `max_history` |
| `customcmd:dispatch` | Active dispatch state (cleared after each call) |
| `customcmd:history` | Audit log `entries[]` (newest first) |
| `customcmd:temp` | Internal scratch space |

---

## API

### Register a command

```mcfunction
function customcmd:api/register {name:"greet",namespace:"mypack",\\
  description:"Greet a player",usage:"greet <player>",\\
  permission:1,handler:"mypack:commands/greet"}
```

Call this from your pack's load function (or from `#customcmd:on_load`).

### Dispatch programmatically

```mcfunction
data modify storage customcmd:dispatch command set value "greet"
data modify storage customcmd:dispatch args set value {target:"Notch"}
execute as <player> run function customcmd:api/dispatch
```

### Set / get permission

```mcfunction
execute as <player> run function customcmd:api/set_permission {level:2}
execute as <player> run function customcmd:api/get_permission
# result → customcmd:temp.caller_perm
```

### List all commands

```mcfunction
execute as <player> run function customcmd:api/list
```

### Unregister

```mcfunction
function customcmd:api/unregister {name:"greet"}
```

---

## Permission levels

| Level | Label | Notes |
|---|---|---|
| 0 | Guest | Default; cannot run any command |
| 1 | User | Basic player commands |
| 2 | Moderator | |
| 3 | Admin | |
| 4 | Owner | Bypasses all permission checks |

Assign with `execute as <player> run function customcmd:api/set_permission {level:N}`.
Grant `ccmd.admin` tag to receive framework debug output.

---

## Hook tags

Integrator packs append their functions to these tags:

| Tag | Fired when |
|---|---|
| `#customcmd:on_load` | Framework finishes loading |
| `#customcmd:on_register` | A command has been registered |
| `#customcmd:on_dispatch` | Just before a handler runs |

---

## Player input (trigger)

Players use `/trigger ccmd.trigger set <id>` where `<id>` is the numeric
command ID shown in `customcmd:api/list`.

Trigger input does **not** support arguments.
For argument-bearing commands, populate `customcmd:dispatch.args` before
calling `customcmd:api/dispatch` from your own logic (books, signs, etc.).

---

## Integrator example

```
# mypack/function/load.mcfunction
function customcmd:api/register {name:"greet",namespace:"mypack",\\
  description:"Greet another player",usage:"greet <player>",\\
  permission:1,handler:"mypack:commands/greet"}
```

```
# mypack/function/commands/greet.mcfunction
# customcmd:dispatch.args is a compound — access your args here
# customcmd:dispatch.caller_name holds the player's name

data modify storage customcmd:temp greet_msg set value "Hello from CustomCMD!"
function customcmd:util/send_message {msg:"Hello!",color:"green"}
```

```json
// mypack/tags/function/on_load.json
{ "values": ["mypack:load"] }
```

---

## Limitations

- Double-quotes inside `description` or `usage` macro strings will break SNBT parsing.
- Command registry search is O(n); registries over ~200 commands may see
  slight dispatch latency.
- `trigger` input does not support text arguments natively.

---

