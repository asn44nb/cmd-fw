name: "Build CustomCMD Framework"

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message"
        required: false
        default: "chore: generate CustomCMD Framework v1.0.0"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Generate datapack files"
        run: python3 .github/scripts/generate.py

      - name: "Package datapack (.zip)"
        run: |
          zip -r customcmd-framework-v1.0.0.zip pack.mcmeta data/ README.md
          unzip -l customcmd-framework-v1.0.0.zip

      - name: "Commit generated files"
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pack.mcmeta data/ README.md
          if git diff --cached --quiet; then
            echo "Nothing changed - skipping commit."
          else
            git commit -m "${{ github.event.inputs.commit_message }}"
            git push
          fi

      - name: "Upload artifact"
        uses: actions/upload-artifact@v4
        with:
          name: customcmd-framework-v1.0.0
          path: customcmd-framework-v1.0.0.zip
          retention-days: 30
